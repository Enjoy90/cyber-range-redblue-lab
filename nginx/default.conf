# =====================================================================
#  NGINX  -  Reverse proxy di depan Node app
# ---------------------------------------------------------------------
#  KENAPA ADA NGINX?
#   Brief Blue Team minta "Raw Nginx-style access logs (access.log)".
#   Nginx kita pasang sebagai pintu depan port 3075, dan dia yang
#   menulis access.log + error.log ber-format nginx ke /opt/admin/logs.
#
#   Log forensik "cerita serangan" yang persis (timestamp 18:50:15 dst)
#   tetap DISUNTIK oleh scripts/inject_logs.py saat deploy. Nginx di sini
#   memastikan format & lokasi log realistis untuk traffic live.
# =====================================================================

# Format log: nginx "combined" + tambahan $http_x_forwarded_for di akhir,
# karena Blue Team perlu membaca header X-Forwarded-For (berisi Base64 exfil).
log_format rangefmt '$remote_addr - - [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

server {
    listen 3075;                       # FLAG: web app di port 3075
    server_name feedback.admin.local;  # zona internal sesuai brief

    # FLAG: lokasi log -> SCENARIO75{/opt/admin/logs}
    # CATATAN: access.log & error.log (forensik Blue Team) ditulis OLEH
    # inject_logs.py secara deterministik. Agar tidak bentrok/korup, traffic
    # LIVE nginx ditulis ke berkas terpisah *.live.log di direktori yang sama.
    access_log /opt/admin/logs/access.live.log rangefmt;
    error_log  /opt/admin/logs/error.live.log warn;

    location / {
        proxy_pass http://app:3075;    # teruskan ke container Node "app"
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
