# Reverse proxy in front of the Node app, terminating on port 3075.
# The forensic access.log/error.log are seeded by scripts/inject_logs.py;
# live nginx traffic is written to *.live.log to avoid clobbering them.

log_format rangefmt '$remote_addr - - [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

server {
    listen 3075;
    server_name feedback.admin.local;

    access_log /opt/admin/logs/access.live.log rangefmt;
    error_log  /opt/admin/logs/error.live.log warn;

    location / {
        proxy_pass http://app:3075;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
