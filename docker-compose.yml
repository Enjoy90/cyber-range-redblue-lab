# Orchestrates the lab: nginx (edge), app (Node), admin-bot (victim browser).
# The shared volume exposes /opt/admin/logs to the host for the Blue Team.
services:

  app:
    build: ./app
    container_name: range-app
    environment:
      - PORT=3075
      - LOG_DIR=/opt/admin/logs
    volumes:
      - adminlogs:/opt/admin/logs
    networks:
      range:
        aliases:
          - feedback.admin.local
    expose:
      - "3075"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: range-nginx
    depends_on:
      - app
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - adminlogs:/opt/admin/logs
    networks:
      - range
    ports:
      - "3075:3075"
    restart: unless-stopped

  admin-bot:
    build: ./admin-bot
    container_name: range-admin-bot
    depends_on:
      - nginx
    environment:
      - TARGET_URL=http://nginx:3075
      - INTERVAL_MS=8000
    networks:
      - range
    restart: unless-stopped

volumes:
  adminlogs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/admin/logs

networks:
  range:
    driver: bridge
